version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=fretehub_db
      - POSTGRES_USER=fretehub_user
      - POSTGRES_PASSWORD=fretehub_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fretehub_user -d fretehub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-dev-secret-key-123456
      - DATABASE_URL=postgis://fretehub_user:fretehub_pass@db:5432/fretehub_db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - JWT_SECRET=dev-jwt-signing-secret-key-should-be-very-long
      - MAPS_PROVIDER=mock
      - PAYMENT_PROVIDER=mock
      - LLM_PROVIDER=mock
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      - DEFAULT_FROM_EMAIL=no-reply@fretehub.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  daphne:
    build: .
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-dev-secret-key-123456
      - DATABASE_URL=postgis://fretehub_user:fretehub_pass@db:5432/fretehub_db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,daphne
      - JWT_SECRET=dev-jwt-signing-secret-key-should-be-very-long
      - MAPS_PROVIDER=mock
      - PAYMENT_PROVIDER=mock
      - LLM_PROVIDER=mock
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      - DEFAULT_FROM_EMAIL=no-reply@fretehub.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-dev-secret-key-123456
      - DATABASE_URL=postgis://fretehub_user:fretehub_pass@db:5432/fretehub_db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - JWT_SECRET=dev-jwt-signing-secret-key-should-be-very-long
      - MAPS_PROVIDER=mock
      - PAYMENT_PROVIDER=mock
      - LLM_PROVIDER=mock
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      - DEFAULT_FROM_EMAIL=no-reply@fretehub.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-dev-secret-key-123456
      - DATABASE_URL=postgis://fretehub_user:fretehub_pass@db:5432/fretehub_db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - JWT_SECRET=dev-jwt-signing-secret-key-should-be-very-long
      - MAPS_PROVIDER=mock
      - PAYMENT_PROVIDER=mock
      - LLM_PROVIDER=mock
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      - DEFAULT_FROM_EMAIL=no-reply@fretehub.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@fretehub.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
