<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreteHub - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <h1>FreteHub</h1>
                <p>O hub inteligente que conecta cargas, motoristas e transportadoras</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            
            <div class="divider">
                <span>ou</span>
            </div>
            
            <button id="googleLogin" class="btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24"></svg>
                Entrar com Google
            </button>
            
            <p class="register-link">
                Não tem conta? <a href="#" id="showRegister">Cadastre-se</a>
            </p>
        </div>
        
        <div class="register-card" style="display: none;">
            <div class="logo">
                <h1>FreteHub</h1>
                <p>Cadastre-se na plataforma</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Seu nome" required>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">E-mail</label>
                    <input type="email" id="regEmail" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Telefone</label>
                    <input type="tel" id="phone" placeholder="(11) 99999-9999">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="documentType">Tipo</label>
                        <select id="documentType">
                            <option value="CPF">CPF</option>
                            <option value="CNPJ">CNPJ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="documentNumber">Número</label>
                        <input type="text" id="documentNumber" placeholder="000.000.000-00">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="userType">Tipo de Conta</label>
                    <select id="userType">
                        <option value="PF">Cliente Pessoa Física</option>
                        <option value="PJ">Cliente Pessoa Jurídica</option>
                        <option value="DRIVER">Motorista</option>
                        <option value="CARRIER">Transportadora</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Senha</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>
            
            <p class="register-link">
                Já tem conta? <a href="#" id="showLogin">Faça login</a>
            </p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
